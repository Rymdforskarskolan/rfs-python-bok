name: Build and Publish Static Site Release Asset

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build from and upload artifact to"
        required: true
        type: string
  release:
    types: [published]

env:
  BASE_URL: "/bok"

permissions:
  contents: write

jobs:
  build-and-publish:
    env:
      RELEASE_TAG: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.tag }}
    concurrency:
      group: release-${{ github.event_name == 'release' && github.event.release.id || inputs.tag }}
      cancel-in-progress: false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install Python dependencies and register kernel
        run: |
          python -m pip install --upgrade pip
          pip install jupyter-book ipykernel
          python -m ipykernel install --name=python3 --display-name "Python 3 (ipykernel)" --sys-prefix

      - name: Build HTML Assets
        run: jupyter book build --html --execute

      - name: Package built site
        run: |
          tar -C _build -czf "site-${{ env.RELEASE_TAG }}.tar.gz" html

      - name: Check if asset already exists
        id: check_asset
        env:
          GH_TOKEN: ${{ github.token }}
          ASSET_NAME: site-${{ env.RELEASE_TAG }}.tar.gz
        run: |
          ASSET_ID=$(gh release view "$RELEASE_TAG" --json assets --jq ".assets[] | select(.name == \"$ASSET_NAME\") | .id")
          if [ -n "$ASSET_ID" ]; then
            echo "Asset $ASSET_NAME already exists on release $RELEASE_TAG; skipping upload."
            echo "upload_needed=false" >> "$GITHUB_OUTPUT"
          else
            echo "upload_needed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload release asset
        if: steps.check_asset.outputs.upload_needed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ env.RELEASE_TAG }}" "site-${{ env.RELEASE_TAG }}.tar.gz"
